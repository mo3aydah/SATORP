<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>Greeting Card | بطاقة معايدة</title>
</head>
<body class="page-lang-select">
    <div class="lang-select-bg">
        <div class="lang-select-bg-mirror" id="langSelectBgMirror" aria-hidden="true"></div>
    </div>
    <div class="container page-lang-select-inner">
        <section class="lang-select-content" aria-label="Language selection">
            <h1 class="lang-select-title">
                <span class="lang-select-title-ar lang-ar" dir="rtl">تهنئة العيد لمن يعز عليك</span>
                <span class="lang-select-title-en lang-en">An Eid Greeting for Someone Special</span>
            </h1>
            <p class="lang-select-desc lang-select-desc-ar lang-ar" dir="rtl">أنشئ بطاقة تهنئة بالعيد مميزة وشاركها مع من تحب</p>
            <p class="lang-select-desc lang-en">Create a special Eid greeting card and share it with your loved ones</p>
            <div class="card-deck" id="cardDeck" role="listbox" aria-label="Choose card design">
                <div class="card-deck-item selected" data-card="1" role="option" aria-selected="true" tabindex="0">
                    <img src="assets/images/Satorp - Ramadan Design (Employees greeting).png" alt="Eid card design 1" />
                </div>
                <div class="card-deck-item" data-card="2" role="option" aria-selected="false" tabindex="0">
                    <img src="assets/images/new-design.jpg.jpeg" alt="Eid card design 2" />
                </div>
            </div>
            <p class="deck-hint deck-hint-bilingual">
                <span class="lang-ar" dir="rtl">اسحب واختر</span>
                <span class="deck-hint-sep" aria-hidden="true"> · </span>
                <span class="lang-en">Swipe and choose</span>
            </p>
            <div class="lang-select-buttons">
                <a href="ar.html" id="langAr" class="btn lang-btn-primary" dir="rtl" aria-label="العربية">العربية</a>
                <a href="en.html" id="langEn" class="btn lang-btn-primary" aria-label="English">English</a>
            </div>
        </section>
    </div>

    <script src="assets/js/deck-select.js"></script>
    <footer class="text-center mt-5 py-2 fixed-bottom footer-lang-page">
        <p class="mb-0">Powered by
            <a href="https://6degrees.com.sa/en" target="_blank" rel="noopener" class="footer-link footer-logo-link">
                <img src="assets/images/6degrees-logo.png" alt="6 Degrees" class="footer-logo" />
            </a>
        </p>
    </footer>
</body>
</html>
